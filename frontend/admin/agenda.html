<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENTAU - Agenda de Visitas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        h1,
        h2,
        h3 {
            font-family: 'Poppins', sans-serif;
        }

        .text-rentau-navy {
            color: #002D5B;
        }

        .bg-rentau-navy {
            background-color: #002D5B;
        }

        .text-rentau-gold {
            color: #FFB800;
        }

        .bg-rentau-gold {
            background-color: #FFB800;
        }

        .filter-btn {
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .filter-btn.active {
            color: #002D5B;
            border-bottom-color: #FFB800;
            font-weight: 700;
        }

        .visit-card {
            transition: transform 0.2s ease;
        }

        .visit-card:hover {
            transform: scale(1.01);
        }

        /* Estilos de Modales */
        #confirm-modal,
        #delete-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 45, 91, 0.4);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        #confirm-modal.active,
        #delete-modal.active {
            display: flex;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <div id="confirm-modal">
        <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full mx-4 shadow-2xl text-center">
            <div
                class="w-16 h-16 bg-green-50 text-green-600 rounded-full flex items-center justify-center text-2xl mx-auto mb-4">
                <i class="fa-solid fa-check-double"></i>
            </div>
            <h3 class="text-xl font-bold text-rentau-navy mb-2">¿Confirmar Visita?</h3>
            <p class="text-slate-500 text-sm mb-6">Al confirmar, la cita se marcará como finalizada en el sistema.</p>
            <div class="flex gap-3">
                <button onclick="closeModal()"
                    class="flex-1 py-3 text-slate-400 font-bold uppercase text-[10px] tracking-widest hover:bg-slate-50 rounded-xl">Atrás</button>
                <button onclick="confirmVisitAction()"
                    class="flex-1 bg-rentau-navy text-white py-3 rounded-xl font-bold uppercase text-[10px] tracking-widest hover:opacity-90 shadow-lg">Confirmar</button>
            </div>
        </div>
    </div>

    <div id="delete-modal">
        <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full mx-4 shadow-2xl text-center border border-slate-100">
            <div
                class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center text-2xl mx-auto mb-4">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h3 class="text-xl font-bold text-rentau-navy mb-2">¿Eliminar cita?</h3>
            <p class="text-slate-500 text-sm mb-6">Esta acción borrará la cita permanentemente de la base de datos de
                Zacatepec.</p>
            <div class="flex gap-3">
                <button onclick="closeDeleteModal()"
                    class="flex-1 py-3 text-slate-400 font-bold uppercase text-[10px] tracking-widest hover:bg-slate-50 rounded-xl">Cancelar</button>
                <button onclick="executeDelete()"
                    class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold uppercase text-[10px] tracking-widest hover:bg-red-700 shadow-lg">Eliminar</button>
            </div>
        </div>
    </div>

    <header class="p-4 md:p-6 bg-white border-b border-slate-100">
        <div class="max-w-7xl mx-auto flex justify-between items-center w-full">
            <div class="flex items-center">
                <a href="inicioadmin.html"
                    class="text-rentau-navy flex items-center hover:opacity-70 transition-opacity">
                    <i class="fa-solid fa-arrow-left text-xl"></i>
                    <span class="ml-6 text-xl font-bold tracking-tight">
                        Agenda de <span class="text-rentau-gold">Visitas</span>
                    </span>
                </a>
            </div>

            <div class="flex items-center gap-4 pl-6 border-l border-slate-200">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-bold text-rentau-navy leading-tight">Alexandra Sánchez</p>
                    <p class="text-[11px] text-slate-400 font-medium">ID: 2026-ADM-01</p>
                </div>
                <div
                    class="w-10 h-10 rounded-full bg-rentau-navy text-white flex items-center justify-center font-bold border-2 border-rentau-gold shadow-sm">
                    AS
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl w-full mx-auto p-6 flex-grow">
        <div
            class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6 bg-white p-2 rounded-2xl shadow-sm border border-slate-100">
            <div class="flex gap-8 px-6">
                <button onclick="filterVisits('TODAS', this)"
                    class="filter-btn active py-3 uppercase text-[11px] tracking-widest">Todas</button>
                <button onclick="filterVisits('HOY', this)"
                    class="filter-btn py-3 uppercase text-[11px] tracking-widest">Hoy</button>
                <button onclick="filterVisits('ESTA SEMANA', this)"
                    class="filter-btn py-3 uppercase text-[11px] tracking-widest">Esta Semana</button>
                <button onclick="filterVisits('MES', this)"
                    class="filter-btn py-3 uppercase text-[11px] tracking-widest">Mes</button>
            </div>
            <div class="relative w-full md:w-64 pr-2">
                <i class="fa-solid fa-calendar-days absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" readonly value="17 de Abril, 2026"
                    class="w-full pl-11 pr-4 py-2 bg-slate-50 border-none rounded-xl text-xs font-bold text-rentau-navy outline-none">
            </div>
        </div>

        <div id="visits-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>
    </main>

    <footer class="p-8 text-center text-slate-400 text-[10px] tracking-widest uppercase font-medium">
        © 2026 RENTAU S.A. - Sistema de Gestión de Prospectos
    </footer>

    <script src="../js/adminAgenda.js"></script>
</body>

</html>
