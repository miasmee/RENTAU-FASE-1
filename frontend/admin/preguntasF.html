<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENTAU - Panel Administrativo FAQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        h1,
        h2,
        h3 {
            font-family: 'Poppins', sans-serif;
        }

        .text-rentau-navy {
            color: #002D5B;
        }

        .bg-rentau-navy {
            background-color: #002D5B;
        }

        .text-rentau-gold {
            color: #FFB800;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            outline: none;
            transition: all 0.2s;
        }

        .form-input:focus {
            border-color: #FFB800;
            box-shadow: 0 0 0 3px rgba(255, 184, 0, 0.1);
        }

        .faq-card {
            transition: all 0.3s ease;
        }

        .faq-card:hover {
            border-color: #FFB800;
            background-color: #fffdf7;
        }

        /* Estilos para el Modal de Notificación */
        #notification-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 45, 91, 0.4);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        #notification-modal.flex {
            display: flex;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <header class="p-4 md:p-6 bg-white border-b border-slate-100 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center w-full">
            <div class="flex items-center">
                <a href="inicioadmin.html"
                    class="text-rentau-navy flex items-center hover:opacity-70 transition-opacity">
                    <i class="fa-solid fa-arrow-left text-xl"></i>
                    <span class="ml-6 text-xl font-bold tracking-tight">
                        Gestión de <span class="text-rentau-gold">FAQ</span>
                    </span>
                </a>
            </div>
            <div class="flex items-center gap-4 pl-6 border-l border-slate-200">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-bold text-rentau-navy leading-tight">Alexandra Sánchez</p>
                    <p class="text-[11px] text-slate-400 font-medium italic">Admin</p>
                </div>
                <div
                    class="w-10 h-10 rounded-full bg-rentau-navy text-white flex items-center justify-center font-bold border-2 border-rentau-gold">
                    AS</div>
            </div>
        </div>
    </header>

    <main class="max-w-5xl w-full mx-auto p-6 flex-grow">

        <section id="form-container" class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 p-8 mb-10">
            <div class="flex items-center gap-3 mb-6">
                <div id="form-icon"
                    class="w-10 h-10 rounded-xl bg-purple-50 text-purple-600 flex items-center justify-center">
                    <i class="fa-solid fa-plus"></i>
                </div>
                <h2 id="form-title" class="text-lg font-bold text-rentau-navy uppercase">Agregar Nueva Pregunta</h2>
            </div>

            <form id="faq-form" onsubmit="event.preventDefault(); saveFaq();" class="space-y-4">
                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label
                            class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 block">Pregunta</label>
                        <input type="text" id="input-pregunta" placeholder="¿Cuál es la duda común?" class="form-input"
                            required>
                    </div>
                    <div>
                        <label
                            class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 block">Respuesta</label>
                        <textarea id="input-respuesta" rows="3" placeholder="Escribe la solución detallada..."
                            class="form-input resize-none" required></textarea>
                    </div>
                </div>
                <div class="flex justify-end gap-3 pt-2">
                    <button type="reset" onclick="resetForm()"
                        class="px-6 py-3 text-slate-400 font-bold uppercase text-[11px] hover:text-red-500 transition-colors">Limpiar</button>
                    <button type="submit" id="btn-submit-faq"
                        class="bg-rentau-navy text-white px-8 py-3 rounded-xl font-bold uppercase text-[11px] hover:opacity-90 transition-all shadow-md">Guardar
                        Pregunta</button>
                </div>
            </form>
        </section>

        <section class="space-y-6">
            <h2 class="text-xl font-bold text-rentau-navy">Preguntas Publicadas</h2>
            <div id="faq-list" class="grid grid-cols-1 gap-4"></div>
        </section>
    </main>

    <footer class="p-8 text-center text-slate-400 text-[10px] tracking-widest uppercase font-medium">
        © 2026 RENTAU S.A. - Panel de Control
    </footer>

    <div id="confirm-modal"
        class="hidden fixed inset-0 bg-[rgba(0,45,91,0.4)] backdrop-blur-sm z-[1100] items-center justify-center">
        <div class="bg-white rounded-[2rem] p-10 max-w-sm w-full mx-4 shadow-2xl text-center border border-slate-100">
            <div
                class="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center text-3xl mx-auto mb-6 shadow-inner">
                <i class="fa-solid fa-trash-can"></i>
            </div>
            <h3 class="text-2xl font-bold text-rentau-navy mb-2">¿Eliminar duda?</h3>
            <p class="text-slate-500 text-sm mb-8 leading-relaxed">Esta acción no se puede deshacer. La pregunta
                desaparecerá del FAQ.</p>
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()"
                    class="flex-1 bg-slate-100 text-slate-500 py-4 rounded-xl font-bold uppercase text-[11px] tracking-widest hover:bg-slate-200 transition-all">Cancelar</button>
                <button id="btn-confirm-delete"
                    class="flex-1 bg-red-500 text-white py-4 rounded-xl font-bold uppercase text-[11px] tracking-widest hover:bg-red-600 transition-all shadow-lg">Eliminar</button>
            </div>
        </div>
    </div>

    <div id="notification-modal" class="hidden">
        <div class="bg-white rounded-[2rem] p-10 max-w-sm w-full mx-4 shadow-2xl text-center border border-slate-100">
            <div id="modal-icon-container"
                class="w-20 h-20 bg-green-50 text-green-500 rounded-full flex items-center justify-center text-3xl mx-auto mb-6 shadow-inner">
                <i id="modal-icon" class="fa-solid fa-check"></i>
            </div>
            <h3 id="modal-title" class="text-2xl font-bold text-rentau-navy mb-2">¡Éxito!</h3>
            <p id="modal-desc" class="text-slate-500 text-sm mb-8 leading-relaxed">Acción realizada correctamente.</p>
            <button onclick="closeModal()"
                class="w-full bg-rentau-navy text-white py-4 rounded-xl font-bold uppercase text-[11px] tracking-widest hover:opacity-90 transition-all shadow-lg">Aceptar</button>
        </div>
    </div>

    <script src="../js/preguntasF.js"></script>
</body>

</html>
